<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Misión: Conexión Submarina | Ojo al Click</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --fondo: #050a14; --cian: #00ffff; --fucsia: #ff00ff; --amarillo: #fbff00; }
        body { background: var(--fondo); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #0a1931 0%, #050a14 100%); }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 20; pointer-events: none; }
        .stat { font-size: 1.2rem; text-shadow: 2px 2px #000; color: var(--cian); margin-bottom: 5px; }
        #pantalla-info {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: rgba(5,10,20,0.95); padding: 40px;
            border: 3px solid var(--cian); border-radius: 15px; z-index: 100;
            box-shadow: 0 0 30px var(--cian); min-width: 280px;
        }
        button {
            background: var(--fucsia); color: white; border: none; padding: 15px 40px;
            font-family: 'Orbitron'; font-weight: 900; cursor: pointer;
            font-size: 1.2rem; border-radius: 5px; box-shadow: 0 5px 0 #b00040;
            margin-top: 20px;
        }
        button:active { transform: translateY(4px); box-shadow: none; }
        .salir-btn {
            position: absolute; bottom: 20px; right: 20px;
            color: var(--cian); text-decoration: none; font-size: 0.8rem;
            border: 1px solid var(--cian); padding: 8px 15px; z-index: 50;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div class="stat">DATOS REPARADOS: <span id="score">0</span></div>
        <div class="stat">CABLES (VIDAS): <span id="lives">3</span></div>
    </div>
    <div id="pantalla-info">
        <h1 id="titulo" style="color:var(--amarillo); margin-top:0;">MISIÓN 01</h1>
        <p id="descripcion">Los tiburones muerden los cables submarinos.<br><br>Atrapa <b>FIBRA (💎)</b><br>Esquiva <b>TIBURONES (🦈)</b></p>
        <button onclick="iniciarJuegoCompleto()">INICIAR INMERSIÓN</button>
    </div>
    <a href="../recreativo.html" class="salir-btn">SALIR AL RECREATIVO</a>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const pantalla = document.getElementById('pantalla-info');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0, lives = 3, gameRunning = false, items = [];
let player = { x: canvas.width / 2, y: canvas.height - 120, w: 70, h: 70 };

// --- MOTOR DE SONIDO RETRO (WEB AUDIO API) ---
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(frequency, duration, type = 'square', volume = 0.1) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    oscillator.type = type; // 'square' para sonido NES/GameBoy
    oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
    
    gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
    // Efecto de desvanecimiento para que no sea un "clic" seco
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    oscillator.start();
    oscillator.stop(audioCtx.currentTime + duration);
}

// Funciones específicas de sonido
function soundIntro() {
    playSound(400, 0.1, 'square', 0.1);
    setTimeout(() => playSound(600, 0.1, 'square', 0.1), 100);
    setTimeout(() => playSound(800, 0.3, 'square', 0.1), 200);
}

function soundScore() { playSound(1200, 0.08, 'square', 0.08); } // Pitido agudo
function soundDamage() { playSound(150, 0.15, 'triangle', 0.2); } // Pitido grave/ruido
function soundGameOver() {
    playSound(300, 0.2, 'square', 0.1);
    setTimeout(() => playSound(200, 0.2, 'square', 0.1), 200);
    setTimeout(() => playSound(100, 0.4, 'triangle', 0.1), 400);
}

// Controles (Ratón y Táctil)
window.addEventListener('mousemove', (e) => { player.x = e.clientX - player.w/2; });
window.addEventListener('touchmove', (e) => { 
    player.x = e.touches[0].clientX - player.w/2;
    e.preventDefault();
}, {passive: false});


// Función intermedia para activar el sonido antes de empezar (requerimiento del navegador)
function iniciarJuegoCompleto() {
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
    soundIntro();
    setTimeout(startGame, 400); // Esperamos a que acabe el sonido intro
}

function startGame() {
    score = 0; lives = 3; items = [];
    scoreEl.innerText = score; livesEl.innerText = lives;
    gameRunning = true;
    pantalla.style.display = 'none';
    animate();
}

function spawnItem() {
    const isShark = Math.random() > 0.7; 
    items.push({
        x: Math.random() * (canvas.width - 50),
        y: -50,
        speed: 3.5 + (score / 200),
        type: isShark ? '🦈' : '💎',
        isShark: isShark
    });
}

function animate() {
    if (!gameRunning) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.font = '60px Arial';
    ctx.fillText('🤿', player.x, player.y + 55);

    if (Math.random() < 0.05) spawnItem();

    items.forEach((item, index) => {
        item.y += item.speed;
        ctx.font = '45px Arial';
        ctx.fillText(item.type, item.x, item.y);

        if (item.y > player.y && item.y < player.y + player.h &&
            item.x > player.x && item.x < player.x + player.w) {
            
            if (item.isShark) {
                lives--;
                soundDamage(); // SONIDO DAÑO
                livesEl.innerText = lives;
                ctx.fillStyle = "rgba(255, 0, 0, 0.4)";
                ctx.fillRect(0,0, canvas.width, canvas.height);
            } else {
                score += 10;
                soundScore(); // SONIDO PUNTUACIÓN
                scoreEl.innerText = score;
            }
            items.splice(index, 1);
        }
        if (item.y > canvas.height) items.splice(index, 1);
    });

    if (lives <= 0) {
        gameRunning = false;
        soundGameOver(); // SONIDO FIN JUEGO
        pantalla.style.display = 'block';
        document.getElementById('titulo').innerText = "¡CABLE CORTADO!";
        document.getElementById('titulo').style.color = "var(--fucsia)";
        document.getElementById('descripcion').innerHTML = `Has perdido la conexión.<br>Puntuación: ${score}`;
        document.querySelector('button').innerText = "REINTENTAR";
        // Al reintentar, llamamos directamente a startGame para no repetir la intro larga
        document.querySelector('button').setAttribute('onclick', 'startGame()');
    } else {
        requestAnimationFrame(animate);
    }
}

window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
